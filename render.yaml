services:
  - type: web
    name: fingenie-agent
    runtime: python
    rootDir: services
    python:
      version: "3.11"
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LOCAL_LLM_MODEL_ID
        value: Qwen/Qwen2.5-1.5B-Instruct
      - key: LOCAL_LLM_DEVICE
        value: cpu
      - key: LOCAL_LLM_LOAD_IN_4BIT
        value: "false"
    plan: standard  # CPU inference for the 1.5B LLM benefits from more RAM

  - type: web
    name: fingenie-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CLIENT_URL
        sync: false
      - key: FLASK_API_URL
        fromService:
          type: web
          name: fingenie-agent
          property: hostport
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    plan: starter

  - type: web
    name: fingenie-client
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: fingenie-server
          property: hostport
      - key: REACT_APP_FASTAPI_URL
        fromService:
          type: web
          name: fingenie-agent
          property: hostport
    plan: starter
