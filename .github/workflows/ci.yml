name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Server (Node/Express) ──────────────────────────────────────────────
  server:
    name: Server (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          # Provide a test JWT secret so env.js does not warn or exit
          JWT_SECRET: ci_test_secret_at_least_32_chars_long
          MONGO_URL: mongodb://localhost:27017/fingenie_ci_test

  # ── Client (React) ────────────────────────────────────────────────────
  client:
    name: Client (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build (production)
        run: npm run build
        env:
          CI: false   # treat warnings as warnings, not errors
      - name: Unit tests
        run: npm test -- --watchAll=false --forceExit
        env:
          CI: true

  # ── Services (FastAPI / Python) ───────────────────────────────────────
  services:
    name: Services (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    env:
      # Prevent Qwen from auto-downloading model weights during CI
      LOCAL_LLM_DEVICE: cpu
      LOCAL_LLM_LOAD_IN_4BIT: "false"
      # Silence TensorFlow progress bars / oneDNN info in logs
      TF_CPP_MIN_LOG_LEVEL: "3"
      TF_ENABLE_ONEDNN_OPTS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Install only the lightweight subset needed for tests.
      # Heavy ML packages (torch, tensorflow, transformers) are already
      # installed on the machine; in a fresh CI runner, install the test
      # requirements only and mark tests that need the full stack as
      # conditional on availability.
      - name: Install test-only requirements
        run: |
          pip install fastapi httpx pytest pydantic uvicorn python-dotenv
      - name: Try to install full requirements (best-effort, non-fatal)
        run: pip install -r requirements.txt || echo "⚠️  Some heavy deps skipped — LLM/ML tests may be skipped"
        continue-on-error: true
      - name: Run tests (excluding model-weight-dependent tests)
        run: pytest -q --ignore=agent/qwen/test_router_smoke.py

  # ── Playwright E2E (smoke, frontend only) ────────────────────────────
  playwright-smoke:
    name: Playwright E2E (smoke)
    runs-on: ubuntu-latest
    needs: [client]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build static files
        run: npm run build
        env:
          CI: false
      - name: Serve build + run E2E tests
        run: |
          npx serve -s build -l 3000 &
          sleep 3
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test --reporter=list
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
